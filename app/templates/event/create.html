{% extends "base.html" %}

{% block title %}Create Event - Event Planner{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Plan New Event</h1>
    <p class="text-muted">Fill in the details below to submit a new event proposal.</p>
</div>

<div class="card">
    <form action="#" method="POST">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="e.g. Annual Tech Symposium"
                required>
        </div>
        <div class="form-group">
            <label for="description">Detailed Description</label>
            <textarea id="description" name="description" class="form-control" rows="5"
                placeholder="Outline the event objectives, target audience, and requirements..." required></textarea>
        </div>
        <div class="form-row">
            <div class="form-group col">
                <label for="date">Planned Date</label>
                <input type="date" id="date" name="date" class="form-control" required>
            </div>
            <div class="form-group col">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-control">
                    <option value="academic">Academic</option>
                    <option value="cultural">Cultural</option>
                    <option value="workshop">Workshop</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Submit Proposal</button>
    </form>
</div>
{% endblock %}
