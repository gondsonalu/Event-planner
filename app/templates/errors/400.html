{% extends "base.html" %}

{% block title %}400 - Bad Request | EventFlow{% endblock %}

{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 480px; width: 100%; border: none; box-shadow: var(--shadow-md);">
        <div class="card-body" style="padding: 3rem; text-align: center;">
            <div
                style="width: 80px; height: 80px; border-radius: 50%; background: var(--warning-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="bi bi-exclamation-triangle" style="font-size: 2rem; color: var(--warning);"></i>
            </div>
            <h1 style="font-size: 3.5rem; font-weight: 800; color: var(--warning); margin-bottom: 0.5rem;">400</h1>
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Bad Request</h2>
            <p class="text-muted" style="margin-bottom: 2rem;">
                The request could not be understood by the server. Please check your input and try again.
            </p>
            <a href="{{ url_for('main.index') }}" class="btn btn-primary" style="padding: 0.75rem 2rem;">
                <i class="bi bi-house mr-2"></i> Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
