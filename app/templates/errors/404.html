{% extends "base.html" %}

{% block title %}404 - Page Not Found | EventFlow{% endblock %}

{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 480px; width: 100%; border: none; box-shadow: var(--shadow-md);">
        <div class="card-body" style="padding: 3rem; text-align: center;">
            <div
                style="width: 80px; height: 80px; border-radius: 50%; background: var(--info-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="bi bi-search" style="font-size: 2rem; color: var(--info);"></i>
            </div>
            <h1 style="font-size: 3.5rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;">404</h1>
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Page Not Found</h2>
            <p class="text-muted" style="margin-bottom: 2rem;">
                Oops! The page you're looking for doesn't exist or has been moved.
                If you need help, contact support at <strong>{{ admin_email }}</strong>.
            </p>
            <div style="display: flex; gap: 0.75rem; justify-content: center;">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary" style="padding: 0.75rem 2rem;">
                    <i class="bi bi-house mr-2"></i> Home
                </a>
                <button onclick="history.back()" class="btn btn-light" style="padding: 0.75rem 2rem;">
                    <i class="bi bi-arrow-left mr-2"></i> Go Back
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
